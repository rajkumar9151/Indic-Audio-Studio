<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indic Audio Studio | AI4Bharat</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --card: rgba(17, 24, 39, 0.7);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.8);
            --accent: #0ea5e9;
            --accent-glow: rgba(14, 165, 233, 0.2);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: rgba(0, 0, 0, 0.05);
            --input-bg: #ffffff;
        }

        * { box-sizing: border-box; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, var(--accent-glow) 0, transparent 50%),
                radial-gradient(at 100% 100%, var(--accent-glow) 0, transparent 50%);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .container {
            width: 95%;
            max-width: 900px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.5s ease-out;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .theme-toggle {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            z-index: 100;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin: 0;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 40px; font-weight: 300; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

        .input-group { margin-bottom: 24px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea, input, select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            padding: 14px;
            font-size: 1rem;
            font-family: inherit;
        }

        textarea:focus, input:focus, select:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .advanced-settings {
            padding: 20px;
            background: rgba(127, 127, 127, 0.05);
            border-radius: 16px;
            margin-bottom: 30px;
        }

        .settings-row {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .settings-col { flex: 1; }

        button#genBtn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent) 0%, #0ea5e9 100%);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px var(--accent-glow);
        }

        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }

        #resultArea {
            margin-top: 40px;
            padding: 20px;
            background: rgba(56, 189, 248, 0.05);
            border-radius: 16px;
            text-align: center;
            display: none;
        }

        audio { width: 100%; margin: 15px 0; }
        
        .download-link { color: var(--accent); text-decoration: none; font-weight: 600; }

        .loader { display: none; text-align: center; margin: 20px 0; color: var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body data-theme="light">
    <div class="container">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Light/Dark Mode">🌓</button>
        
        <h1>Indic Audio Studio</h1>
        <p class="subtitle">AI4Bharat | Text-to-Audio Premium Engine</p>

        <div class="form-grid">
            <div class="input-group">
                <label>Target Language</label>
                <select id="language" onchange="updatePrompt()">
                    <option value="Tamil">Tamil</option>
                    <option value="Hindi">Hindi</option>
                    <option value="English">English</option>
                    <option value="Telugu">Telugu</option>
                    <option value="Kannada">Kannada</option>
                    <option value="Malayalam">Malayalam</option>
                    <option value="Marathi">Marathi</option>
                    <option value="Gujarati">Gujarati</option>
                    <option value="Bengali">Bengali</option>
                    <option value="Punjabi">Punjabi</option>
                    <option value="Urdu">Urdu</option>
                </select>
            </div>
            <div class="input-group">
                <label>Voice Preset</label>
                <select id="preset" onchange="updatePrompt()">
                    <option value="female_pro">Professional Female</option>
                    <option value="male_deep">Deep Male</option>
                    <option value="female_soft">Soft/Emotional</option>
                    <option value="male_news">News Reporter (Male)</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Script Input</label>
            <textarea id="inputText" rows="6" placeholder="Paste your script here..."></textarea>
        </div>

        <div class="advanced-settings">
            <label>Advanced AI Prompting Settings</label>
            <div class="settings-row">
                <div class="settings-col">
                    <label style="font-size:0.7rem">Speed</label>
                    <select id="speed" onchange="updatePrompt()">
                        <option value="moderate pace">Moderate</option>
                        <option value="slowly and clearly">Slow</option>
                        <option value="fast and energetic">Fast</option>
                    </select>
                </div>
                <div class="settings-col">
                    <label style="font-size:0.7rem">Clarity/Quality</label>
                    <select id="quality" onchange="updatePrompt()">
                        <option value="high quality recording">High Quality</option>
                        <option value="very clear audio">Very Clear</option>
                        <option value="slightly noisy recording">Ambient Tone</option>
                    </select>
                </div>
            </div>
            <div class="input-group" style="margin-top:15px; margin-bottom:0;">
                <label style="font-size:0.7rem">Generated Description Prompt</label>
                <input type="text" id="desc" value="A professional female voice in Tamil, clear and moderate pace, high quality recording.">
            </div>
        </div>

        <button id="genBtn" onclick="generate()">Generate Audio</button>

        <div class="loader" id="loader">Running AI Model on VM... Generating Audio...</div>

        <div id="resultArea">
            <audio id="audioPlayer" controls></audio>
            <br>
            <a id="downloadLink" href="#" download="indic_audio.wav" class="download-link">Download Draft (.wav)</a>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
        }

        function updatePrompt() {
            const lang = document.getElementById('language').value;
            const preset = document.getElementById('preset').value;
            const speed = document.getElementById('speed').value;
            const quality = document.getElementById('quality').value;
            
            let base = "";
            if(preset === 'female_pro') base = "A professional female voice";
            else if(preset === 'male_deep') base = "A deep male voice";
            else if(preset === 'female_soft') base = "A soft emotional female voice";
            else if(preset === 'male_news') base = "A clear male news reporter voice";

            const finalPrompt = `${base} in ${lang}, ${speed}, ${quality}.`;
            document.getElementById('desc').value = finalPrompt;
        }

        async function generate() {
            const text = document.getElementById('inputText').value;
            const desc = document.getElementById('desc').value;
            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const result = document.getElementById('resultArea');

            if (!text.trim()) { alert("Enter some text!"); return; }
            
            btn.disabled = true;
            loader.style.display = 'block';
            result.style.display = 'none';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text, description: desc })
                });
                
                const data = await response.json();
                if(data.status === 'success') {
                    document.getElementById('audioPlayer').src = data.url;
                    document.getElementById('downloadLink').href = data.url;
                    result.style.display = 'block';
                }
            } catch (e) {
                alert("VM Connection Refused. Ensure port 8000 is open!");
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
