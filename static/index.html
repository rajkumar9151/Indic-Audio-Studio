<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indic Audio Studio Ultimate - Tamil AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3d5afe;
            --accent: #00e5ff;
            --bg-light: #f8f9fa;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-dark: rgba(15, 23, 42, 0.8);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #eef2ff, #e0e7ff);
            transition: 0.5s;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a, #151d33);
            color: white;
        }

        .studio-container {
            width: 90%;
            max-width: 900px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow);
            animation: fadeIn 0.8s ease-out;
        }

        body.dark-mode .studio-container {
            background: var(--glass-dark);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            font-size: 2.5rem;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 40px;
        }

        .editor-grid {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 25px;
        }

        @media (max-width: 768px) {
            .editor-grid {
                grid-template-columns: 1fr;
            }
        }

        textarea {
            width: 100%;
            height: 350px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            padding: 20px;
            font-size: 1.1rem;
            resize: none;
            box-sizing: border-box;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }

        body.dark-mode textarea {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-color: rgba(255, 255, 255, 0.1);
        }

        textarea:focus { border-color: var(--primary); }

        .settings-panel {
            background: rgba(255, 255, 255, 0.3);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        body.dark-mode .settings-panel {
            background: rgba(255, 255, 255, 0.05);
        }

        .setting-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; color: #475569; }
        body.dark-mode label { color: #cbd5e1; }

        select, input[type="range"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: white;
            outline: none;
        }

        body.dark-mode select { background: #1e293b; color: white; border-color: #334155; }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-stream { background: var(--primary); color: white; }
        .btn-stream:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(61, 90, 254, 0.3); }

        .btn-render { background: #10b981; color: white; }
        .btn-render:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); }

        .btn-theme {
            position: fixed; top: 20px; right: 20px;
            width: 50px; height: 50px; border-radius: 50%;
            background: white; border: none; box-shadow: var(--shadow);
            cursor: pointer; font-size: 1.5rem;
        }

        #status {
            text-align: center; margin-top: 20px; font-weight: 600; color: var(--primary); min-height: 24px;
        }

        .audio-player-container {
            margin-top: 30px; display: none; padding: 20px;
            background: rgba(0, 0, 0, 0.05); border-radius: 16px;
        }

        audio { width: 100%; margin-bottom: 15px; }

        .download-link {
            text-align: center; color: var(--primary); text-decoration: none; font-weight: bold; display: block;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .quality-toggle {
            display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.05); padding: 5px; border-radius: 10px;
        }

        .quality-btn {
            flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: bold; background: none; transition: 0.3s;
        }

        .quality-btn.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--primary); }
        body.dark-mode .quality-btn.active { background: #334155; color: white; }

        .emotion-badge {
            background: var(--accent); color: white; padding: 2px 8px; border-radius: 5px; font-size: 10px; margin-left: 10px; vertical-align: middle;
        }
        
    </style>
</head>
<body>
    <button class="btn-theme" onclick="toggleTheme()">🌓</button>

    <div class="studio-container">
        <h1>Indic Audio Studio <span style="font-size: 0.5em; vertical-align: middle; opacity: 0.7;">ULTIMATE</span></h1>
        <p class="subtitle">AI4Bharat Indic Parler-TTS &bull; Tamil Professional Production</p>

        <div class="editor-grid">
            <div class="main-editor">
                <textarea id="tts-text" placeholder="உங்கள் உரையை இங்கே தட்டச்சு செய்யவும்... (Type your Tamil script here...)"></textarea>
                <div id="status"></div>
                
                <div class="controls">
                    <button class="btn btn-stream" onclick="generateAudio('stream')">⚡ Quick Stream</button>
                    <button class="btn btn-render" onclick="generateAudio('render')">💾 Full Render (4K)</button>
                </div>

                <div class="audio-player-container" id="player-card">
                    <audio id="audio-player" controls></audio>
                    <a id="download-btn" class="download-link" href="#" target="_blank">⬇️ Download High Quality WAV</a>
                </div>
            </div>

            <div class="settings-panel">
                <div class="setting-group">
                    <label>AI Mode</label>
                    <div class="quality-toggle">
                        <button id="q-turbo" class="quality-btn active" onclick="setQuality('turbo')">TURBO (FP16)</button>
                        <button id="q-4k" class="quality-btn" onclick="setQuality('4k')">4K (FP32)</button>
                    </div>
                </div>

                <div class="setting-group">
                    <label>Voice Emotion <span class="emotion-badge">NEW</span></label>
                    <select id="emotion">
                        <option value="Professional, regular pace, studio quality">Professional (Clear)</option>
                        <option value="Happy, energetic, fast pace, excited">Energetic (Hook)</option>
                        <option value="Soft, emotional, slow pace, reflective">Soft (Storytelling)</option>
                        <option value="Dramatic, deep voice, serious atmosphere">Dramatic (Trailer)</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label>Voice Preset</label>
                    <select id="voice-preset">
                        <option value="A female">Professional Female</option>
                        <option value="A male">Deep Male</option>
                        <option value="A girl">Young Female</option>
                        <option value="A boy">Clear Male</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label>Speech Speed</label>
                    <select id="speed">
                        <option value="moderate pace">Moderate</option>
                        <option value="slow pace">Slow (Narration)</option>
                        <option value="fast pace">Fast (Socials)</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label>Audio Clarity</label>
                    <select id="clarity">
                        <option value="high quality recording">High Quality</option>
                        <option value="studio recording, clean audio">Ultra Studio</option>
                        <option value="very clear voice">Maximum Clarity</option>
                    </select>
                </div>

                <hr style="opacity: 0.1">
                <p style="font-size: 0.75rem; color: #64748b; font-style: italic;">
                    <b>Pro Tip:</b> Use "..." or "[pause]" for natural breathing in Tamil scripts.
                </p>
            </div>
        </div>
    </div>

    <script>
        let selectedQuality = "turbo";

        function setQuality(val) {
            selectedQuality = val;
            document.getElementById('q-turbo').classList.toggle('active', val === 'turbo');
            document.getElementById('q-4k').classList.toggle('active', val === '4k');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
        }

        async function generateAudio(mode) {
            const text = document.getElementById('tts-text').value;
            if (!text) return alert("Please enter some text!");

            const voice = document.getElementById('voice-preset').value;
            const speed = document.getElementById('speed').value;
            const clarity = document.getElementById('clarity').value;
            const emotion = document.getElementById('emotion').value;

            // Combine all AI instructions into one professional prompt
            const description = `${voice} voice, ${emotion}, ${speed}, ${clarity}, speaking in Tamil.`;
            
            const status = document.getElementById('status');
            const playerCard = document.getElementById('player-card');
            const audioPlayer = document.getElementById('audio-player');
            const downloadBtn = document.getElementById('download-btn');

            status.innerText = mode === 'stream' ? "⚡ Processing Stream..." : "💾 Rendering 4K Quality...";
            playerCard.style.display = "none";

            try {
                if (mode === 'stream') {
                    const response = await fetch('/stream', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text, description, quality: selectedQuality })
                    });
                    
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    audioPlayer.src = url;
                    audioPlayer.play();
                    playerCard.style.display = "block";
                    status.innerText = "⚡ Streaming Active";
                } else {
                    const response = await fetch('/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text, description, quality: selectedQuality })
                    });
                    
                    const data = await response.json();
                    if (data.status === 'success') {
                        audioPlayer.src = data.url;
                        downloadBtn.href = data.url;
                        playerCard.style.display = "block";
                        status.innerText = "✅ High Quality Audio Ready!";
                    }
                }
            } catch (err) {
                status.innerText = "❌ Error: " + err.message;
            }
        }
    </script>
</body>
</html>
