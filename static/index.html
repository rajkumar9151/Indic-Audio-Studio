<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indic Audio Studio Ultimate | AI4Bharat</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.85);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: rgba(0, 0, 0, 0.05);
            --input-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg: #030712;
            --card: rgba(17, 24, 39, 0.7);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(0, 0, 0, 0.3);
        }

        * { box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, var(--accent-glow) 0, transparent 50%),
                radial-gradient(at 100% 100%, var(--accent-glow) 0, transparent 50%);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .container {
            width: 95%;
            max-width: 900px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .theme-toggle {
            position: absolute; top: 30px; right: 30px; width: 44px; height: 44px;
            border-radius: 12px; background: var(--input-bg); border: 1px solid var(--border);
            color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px;
        }

        h1 { font-size: 2.2rem; font-weight: 600; margin: 0; text-align: center; color: var(--accent); }
        p.subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 30px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; }

        textarea, input, select { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 14px; color: var(--text-primary); padding: 14px; font-size: 1rem; }

        .advanced-settings { padding: 20px; background: rgba(127, 127, 127, 0.05); border-radius: 16px; margin-bottom: 30px; }
        .settings-row { display: flex; gap: 15px; margin-top: 10px; }
        .settings-col { flex: 1; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 18px; border-radius: 16px; border: none; font-weight: 600; cursor: pointer; font-size: 1.1rem; color: white; }
        #streamBtn { background: #22c55e; }
        #genBtn { background: var(--accent); }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button:disabled { background: #94a3b8; cursor: not-allowed; }

        #resultArea { margin-top: 30px; padding: 20px; background: rgba(56, 189, 248, 0.05); border-radius: 16px; text-align: center; display: none; }
        audio { width: 100%; margin: 15px 0; }
        .download-link { color: var(--accent); text-decoration: none; font-weight: 600; }
        .loader { display: none; text-align: center; margin: 20px 0; color: var(--accent); }
    </style>
</head>
<body data-theme="light">
    <div class="container">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">🌓</button>
        <h1>Indic Audio Studio Ultimate</h1>
        <p class="subtitle">AI4Bharat | The Most Advanced Audio Pipeline</p>

        <div class="form-grid">
            <div class="input-group">
                <label>Target Language</label>
                <select id="language" onchange="updatePrompt()">
                    <option value="Tamil">Tamil</option>
                    <option value="Hindi">Hindi</option>
                    <option value="English">English</option>
                    <option value="Telugu">Telugu</option>
                    <!-- Add more as needed -->
                </select>
            </div>
            <div class="input-group">
                <label>Voice Preset</label>
                <select id="preset" onchange="updatePrompt()">
                    <option value="female_pro">Professional Female</option>
                    <option value="male_deep">Deep Male</option>
                    <option value="female_soft">Soft/Emotional</option>
                    <option value="male_news">News Reporter (Male)</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Script Input</label>
            <textarea id="inputText" rows="5" placeholder="Paste your script here..."></textarea>
        </div>

        <div class="advanced-settings">
            <label>Advanced AI Prompting Settings</label>
            <div class="settings-row">
                <div class="settings-col">
                    <label>Speed</label>
                    <select id="speed" onchange="updatePrompt()">
                        <option value="moderate pace">Moderate</option>
                        <option value="slowly and clearly">Slow</option>
                        <option value="fast and energetic">Fast</option>
                    </select>
                </div>
                <div class="settings-col">
                    <label>Clarity</label>
                    <select id="clarity" onchange="updatePrompt()">
                        <option value="high quality recording">High Quality</option>
                        <option value="very clear audio">Very Clear</option>
                    </select>
                </div>
                <div class="settings-col">
                    <label>Inference Quality</label>
                    <select id="quality">
                        <option value="turbo">Turbo (Speed)</option>
                        <option value="4k">4K (Precision)</option>
                    </select>
                </div>
            </div>
            <div class="input-group" style="margin-top:15px; margin-bottom:0;">
                <label style="font-size:0.7rem">Generated Description Prompt</label>
                <input type="text" id="desc" value="A professional female voice in Tamil, moderate pace, high quality recording.">
            </div>
        </div>

        <div class="btn-row">
            <button id="streamBtn" onclick="stream()">⚡ Quick Stream</button>
            <button id="genBtn" onclick="generate()">💾 Full Render (Download)</button>
        </div>

        <div class="loader" id="loader">Processing... Generating Audio Chunks...</div>

        <div id="resultArea">
            <audio id="audioPlayer" controls></audio>
            <br>
            <a id="downloadLink" href="#" download="indic_studio_final.wav" class="download-link">Download Final WAV ↓</a>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function updatePrompt() {
            const lang = document.getElementById('language').value;
            const preset = document.getElementById('preset').value;
            const speed = document.getElementById('speed').value;
            const clarity = document.getElementById('clarity').value;
            
            let base = "";
            if(preset === 'female_pro') base = "A professional female voice";
            else if(preset === 'male_deep') base = "A deep male voice";
            else if(preset === 'female_soft') base = "A soft emotional female voice";
            else if(preset === 'male_news') base = "A clear male news reporter voice";

            document.getElementById('desc').value = `${base} in ${lang}, ${speed}, ${clarity}.`;
        }

        async function stream() {
            const text = document.getElementById('inputText').value;
            if(!text.trim()) return alert("Enter script!");
            document.getElementById('loader').style.display = 'block';
            try {
                const response = await fetch('/stream', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        text, 
                        description: document.getElementById('desc').value,
                        quality: document.getElementById('quality').value
                    })
                });
                const blob = await response.blob();
                document.getElementById('audioPlayer').src = URL.createObjectURL(blob);
                document.getElementById('resultArea').style.display = 'block';
                document.getElementById('audioPlayer').play();
            } finally { document.getElementById('loader').style.display = 'none'; }
        }

        async function generate() {
            const text = document.getElementById('inputText').value;
            if(!text.trim()) return alert("Enter script!");
            document.getElementById('loader').style.display = 'block';
            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        text, 
                        description: document.getElementById('desc').value,
                        quality: document.getElementById('quality').value
                    })
                });
                const data = await response.json();
                if(data.status === 'success') {
                    document.getElementById('audioPlayer').src = data.url;
                    document.getElementById('resultArea').style.display = 'block';
                    document.getElementById('downloadLink').href = data.url;
                    document.getElementById('downloadLink').style.display = 'inline-block';
                }
            } finally { document.getElementById('loader').style.display = 'none'; }
        }
    </script>
</body>
</html>
