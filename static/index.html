<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indic Audio Studio Pro | AI4Bharat</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.8);
            --accent: #0ea5e9;
            --accent-glow: rgba(14, 165, 233, 0.2);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: rgba(0, 0, 0, 0.05);
            --input-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg: #030712;
            --card: rgba(17, 24, 39, 0.7);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(0, 0, 0, 0.3);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, var(--accent-glow) 0, transparent 50%),
                radial-gradient(at 100% 100%, var(--accent-glow) 0, transparent 50%);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .container {
            width: 95%;
            max-width: 900px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 25px;
            right: 25px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            font-size: 20px;
        }

        h1 { font-size: 2.2rem; font-weight: 600; margin: 0; text-align: center; color: var(--accent); }
        p.subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; }

        textarea, select, input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text-primary); font-size: 1rem; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        
        button { padding: 16px; border-radius: 14px; border: none; font-weight: 600; cursor: pointer; font-size: 1rem; color: white; transition: transform 0.2s; }
        #streamBtn { background: #22c55e; }
        #genBtn { background: var(--accent); }
        button:hover { transform: translateY(-2px); opacity: 0.9; }

        .loader { display: none; text-align: center; margin: 20px 0; color: var(--accent); font-weight: 600; }

        #resultArea { margin-top: 30px; display: none; text-align: center; padding: 20px; border-radius: 16px; background: rgba(56, 189, 248, 0.05); }
        audio { width: 100%; margin: 15px 0; border-radius: 14px; }
        .download-link { color: var(--accent); font-weight: 600; text-decoration: none; display: none; }
    </style>
</head>
<body data-theme="light">
    <div class="container">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">🌓</button>
        <h1>Indic Audio Studio Pro</h1>
        <p class="subtitle">High-Precision AI Text-to-Speech Engine</p>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div class="input-group">
                <label>Language</label>
                <select id="language" onchange="updatePrompt()">
                    <option value="Tamil" selected>Tamil</option>
                    <option value="Hindi">Hindi</option>
                    <option value="English">English</option>
                    <!-- Add more as needed -->
                </select>
            </div>
            <div class="input-group">
                <label>Inference Quality</label>
                <select id="quality">
                    <option value="turbo" selected>High Performance (Turbo)</option>
                    <option value="4k">Ultra Precision (4K Mode)</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Script Content</label>
            <textarea id="inputText" rows="6" placeholder="இதைக் கேட்பதற்காக இங்கே உரையை ஒட்டவும்..."></textarea>
        </div>

        <div class="input-group">
            <label>AI Prompt Description</label>
            <input type="text" id="desc" value="A clear professional female voice in Tamil, moderate pace.">
        </div>

        <div class="btn-row">
            <button id="streamBtn" onclick="stream()">⚡ Quick Stream</button>
            <button id="genBtn" onclick="generate()">💾 Full Render (Download)</button>
        </div>

        <div class="loader" id="loader">Processing on VM GPU... Please wait.</div>

        <div id="resultArea">
            <audio id="audioPlayer" controls></audio>
            <br>
            <a id="downloadLink" href="#" download="indic_studio_final.wav" class="download-link">Download Final WAV for YouTube ↓</a>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function updatePrompt() {
            const lang = document.getElementById('language').value;
            document.getElementById('desc').value = `A clear professional female voice in ${lang}, moderate pace.`;
        }

        async function stream() {
            const text = document.getElementById('inputText').value;
            if(!text.trim()) return alert("Enter script!");
            document.getElementById('loader').style.display = 'block';
            
            try {
                const response = await fetch('/stream', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        text, 
                        description: document.getElementById('desc').value,
                        quality: document.getElementById('quality').value
                    })
                });
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const audio = document.getElementById('audioPlayer');
                audio.src = url;
                document.getElementById('resultArea').style.display = 'block';
                document.getElementById('downloadLink').style.display = 'none';
                audio.play();
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        async function generate() {
            const text = document.getElementById('inputText').value;
            if(!text.trim()) return alert("Enter script!");
            document.getElementById('loader').style.display = 'block';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        text, 
                        description: document.getElementById('desc').value,
                        quality: document.getElementById('quality').value
                    })
                });
                const data = await response.json();
                if(data.status === 'success') {
                    const audio = document.getElementById('audioPlayer');
                    audio.src = data.url;
                    document.getElementById('resultArea').style.display = 'block';
                    document.getElementById('downloadLink').href = data.url;
                    document.getElementById('downloadLink').style.display = 'inline-block';
                }
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
